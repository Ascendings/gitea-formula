{% from "gitea/map.jinja" import gitea_settings as settings with context -%}

# /etc/nsswitch.conf
#
# Configuration for Gitea generated by SaltStack
#
# For information on the available settings, consult the online
# documentation, or see the accompanying file app.ini.defaults, which
# contains the settings incorporated into the gitea binary.
#

APP_NAME = Gitea: Git with a cup of tea
RUN_USER = git
RUN_MODE = prod

[database]
DB_TYPE  = {{ settings.db.type }}
{% if settings.db.type == 'sqlite3' -%}
PATH     = {{ settings.db.path }}
{% else -%}
HOST     = {{ settings.db.host }}
NAME     = {{ settings.db.dbname }}
USER     = {{ settings.db.user }}
PASSWD   = {{ settings.db.passwd }}
SSL_MODE = {{ settings.db.ssl_mode }}
{%- endif %}

[indexer]
ISSUE_INDEXER_PATH = /var/db/gitea/indexers/issues.bleve

[log]
ROOT_PATH = {{ settings.log.path }}
MODE      = {{ settings.log.mode }}
LEVEL     = {{ settings.log.level }}

[mailer]
ENABLED = false

[picture]
AVATAR_UPLOAD_PATH      = {{ settings.picture.avatar_path }}
DISABLE_GRAVATAR        = {{ settings.picture.disable_gravatar }}
ENABLE_FEDERATED_AVATAR = {{ settings.picture.enable_federated_avatar }}

[repository]
ROOT = /var/db/gitea/gitea-repositories

[repository.upload]
TEMP_PATH = /var/db/gitea/data/tmp/uploads

[security]
INSTALL_LOCK   = true
SECRET_KEY     = {{ settings.security.secret_key }}
INTERNAL_TOKEN = {{ settings.security.internal_token }}

[session]
PROVIDER        = file
PROVIDER_CONFIG = /var/db/gitea/data/sessions

[server]
DOMAIN        = {{ settings.server.domain }}
HTTP_ADDR     = {{ settings.server.address }}
HTTP_PORT     = {{ settings.server.port }}
ROOT_URL      = {{ settings.server.root_url }}
DISABLE_SSH   = {{ settings.server.disable_ssh }}
SSH_DOMAIN    = {{ settings.server.ssh_domain }}
SSH_PORT      = {{ settings.server.ssh_port }}
OFFLINE_MODE  = {{ settings.server.offline_mode }}
APP_DATA_PATH = {{ settings.server.app_data_path }}

[service]
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL     = false
DISABLE_REGISTRATION   = true
ENABLE_CAPTCHA         = true
REQUIRE_SIGNIN_VIEW    = false
